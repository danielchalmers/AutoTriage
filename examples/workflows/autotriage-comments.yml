name: AutoTriage (Comments)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: autotriage-shared-db
  cancel-in-progress: false

jobs:
  triage_comment:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v4
        with:
          path: triage-db.json
          key: triage-db-${{ github.run_id }}
          restore-keys: triage-db-

      - name: AutoTriage - triage comment
        uses: danielchalmers/AutoTriage@v3
        with:
          issues: ${{ github.event.issue.number }}
          prompt-path: .github/AutoTriage.prompt
          db-path: triage-db.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
