name: Dependabot Dist Update

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  build_dist:
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Guard changed files
        run: |
          set -euo pipefail
          changed="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
          echo "$changed"
          if [ -n "$changed" ] && echo "$changed" | grep -Ev '^(package\.json|package-lock\.json|\.github/dependabot\.yml|\.github/workflows/.*\.yml|\.github/workflows/.*\.yaml)$' >/dev/null; then
            echo "Dependabot dist updater only supports dependency/workflow-only PRs."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build dist
        run: npm run build

      - name: Commit updated dist
        run: |
          set -euo pipefail
          if git diff --quiet -- dist; then
            echo "No dist changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist
          git commit -m "chore: update dist for dependabot"
          git push
