name: AutoTriage (Issues)

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: autotriage-shared-db
  cancel-in-progress: false

jobs:
  triage_issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache triage DB
        id: cache-db
        uses: actions/cache@v4
        with:
          path: triage-db.json
          key: triage-db-${{ github.run_id }}
          restore-keys: |
            triage-db-

      - name: Triage issue
        uses: ./
        with:
          issues: ${{ github.event.issue.number }}
          prompt-path: examples/AutoTriage.prompt
          db-path: triage-db.json
          model-fast: ""
          model-pro: "gemini-3.1-flash-lite-preview"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: triage-artifacts-${{ github.run_number }}
          path: |
            triage-db.json
            artifacts/
